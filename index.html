<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ MUST -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Karthik Dave</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      box-sizing: border-box;
      max-width: 100%;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>

<body class="bg-gray-50">

<!-- HEADER -->
<header class="bg-white shadow p-4 flex justify-between items-center">

  <h1 class="text-lg font-bold text-blue-700">Karthik Dave</h1>

  <button id="menu-btn" class="text-2xl sm:hidden">☰</button>

  <nav class="hidden sm:flex gap-4 text-sm">
    <a href="#">About</a>
    <a href="#">Impact</a>
    <a href="#">Experience</a>
  </nav>

</header>

<!-- MOBILE MENU -->
<div id="menu" class="hidden p-4 bg-white">
  <a class="block mb-2" href="#">About</a>
  <a class="block mb-2" href="#">Impact</a>
  <a class="block mb-2" href="#">Experience</a>
</div>

<!-- HERO -->
<section class="p-4 text-center">

  <h2 class="text-2xl font-bold mb-3">
    Agile Delivery Simplified
  </h2>

  <p class="text-sm text-gray-600 mb-4">
    Business Analyst • Scrum Master
  </p>

  <div class="flex flex-col gap-3">
    <button class="bg-blue-600 text-white py-2 rounded">View Resume</button>
    <button class="bg-green-600 text-white py-2 rounded">Download</button>
  </div>

</section>

<!-- SCRIPT -->
<script>
document.getElementById("menu-btn").onclick = () => {
  document.getElementById("menu").classList.toggle("hidden");
};
</script>

</body>
</html>
