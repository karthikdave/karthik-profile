<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karthik Dave | Agile Leader & SCWK</title>

<style>
html {
  scroll-behavior: smooth;
}

/* KEY FIX */
section {
  scroll-margin-top: 100px; /* prevents section from hiding under navbar */
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding-top: 80px;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f8fafc;
  color: #1f2937;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  z-index: 9999;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

nav {
  max-width: 1100px;
  margin: auto;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 18px;
}

nav a {
  text-decoration: none;
  color: #374151;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 60px;
  background: linear-gradient(to bottom, #eef2ff, #ffffff);
}

.profile-container {
  width: 170px;
  height: 170px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
}

.profile-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SECTIONS ANIMATION */
section {
  max-width: 1100px;
  margin: auto;
  padding: 80px 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

.section-title {
  text-align: center;
  font-size: 2rem;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 12px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #111827;
  color: #d1d5db;
}
</style>

</head>

<body>

<header>
<nav>
<div><strong>Karthik Dave</strong></div>
<ul>
<li><a href="#experience">Experience</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#scwk">SCWK</a></li>
<li><a href="#posts">Posts</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero show">
<h1>Karthik Dave</h1>
<p>Agile Leader | Scrum Master</p>
</section>

<section id="experience">
<h2 class="section-title">Experience</h2>
<div class="card">Accenture</div>
<div class="card">YASH</div>
<div class="card">Mphasis</div>
</section>

<section id="skills">
<h2 class="section-title">Skills</h2>
<div class="card">Agile, Scrum</div>
</section>

<section id="scwk">
<h2 class="section-title">SCWK</h2>
<div class="card">Agile Simplified</div>
</section>

<section id="posts">
<h2 class="section-title">Posts</h2>
<div class="card">SCWK Shots</div>
</section>

<section id="contact">
<h2 class="section-title">Contact</h2>
<div class="card">LinkedIn</div>
</section>

<footer>
© 2026 Karthik Dave
</footer>

<script>
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  const trigger = window.innerHeight * 0.85;

  sections.forEach(section => {
    if(section.getBoundingClientRect().top < trigger){
      section.classList.add("show");
    }
  });
});
</script>

</body>
</html>
